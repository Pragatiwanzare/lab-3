name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Show files
        run: ls

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend
        run: |
          node backend/server.js &
          sleep 5

      - name: Check frontend
        run: |
          cd frontend
          echo "Frontend loaded"